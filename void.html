<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VOID — Gravity Experiment</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; cursor: none; }
    canvas { display: block; }
    #ui {
      position: fixed;
      top: 2rem;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      pointer-events: none;
      user-select: none;
    }
    #ui h1 {
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.8rem;
      font-weight: 400;
      color: #fff;
      letter-spacing: 0.7em;
      opacity: 0.2;
    }
    #ui p {
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.55rem;
      color: #fff;
      letter-spacing: 0.3em;
      opacity: 0.1;
      margin-top: 0.5rem;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="ui">
    <h1>VOID</h1>
    <p>MOVE &nbsp;·&nbsp; CLICK &nbsp;·&nbsp; RIGHT-CLICK</p>
  </div>

  <script>
    const canvas = document.getElementById('c');
    const ctx    = canvas.getContext('2d');

    let W, H;
    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    /* ── Mouse ─────────────────────────────────────── */
    let mx = null, my = null;
    const shockwaves = [];

    document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
    document.addEventListener('mouseleave', () => { mx = null; my = null; });

    document.addEventListener('click', e => {
      shockwaves.push({ x: e.clientX, y: e.clientY, r: 0, maxR: 320, str:  7 });
    });
    document.addEventListener('contextmenu', e => {
      e.preventDefault();
      shockwaves.push({ x: e.clientX, y: e.clientY, r: 0, maxR: 200, str: -16 });
    });

    /* ── Particles ─────────────────────────────────── */
    const N   = 700;
    const px  = new Float32Array(N);
    const py  = new Float32Array(N);
    const pvx = new Float32Array(N);
    const pvy = new Float32Array(N);
    const psz = new Float32Array(N);

    function spawnEdge(i) {
      const edge = (Math.random() * 4) | 0;
      if      (edge === 0) { px[i] = Math.random() * W; py[i] = -10; }
      else if (edge === 1) { px[i] = W + 10; py[i] = Math.random() * H; }
      else if (edge === 2) { px[i] = Math.random() * W; py[i] = H + 10; }
      else                 { px[i] = -10; py[i] = Math.random() * H; }
      const a = Math.random() * Math.PI * 2;
      const s = 0.2 + Math.random() * 0.6;
      pvx[i] = Math.cos(a) * s;
      pvy[i] = Math.sin(a) * s;
      psz[i] = 0.5 + Math.random() * 1.6;
    }

    /* Seed particles across screen so it's lively immediately */
    for (let i = 0; i < N; i++) {
      px[i]  = Math.random() * window.innerWidth;
      py[i]  = Math.random() * window.innerHeight;
      pvx[i] = (Math.random() - 0.5) * 0.8;
      pvy[i] = (Math.random() - 0.5) * 0.8;
      psz[i] = 0.5 + Math.random() * 1.6;
    }

    /* Velocity → hue: slow = deep blue, fast = orange/red */
    function velHue(vx, vy) {
      const s = Math.sqrt(vx * vx + vy * vy);
      return Math.max(0, 215 - s * 22);
    }

    /* ── Main loop ─────────────────────────────────── */
    function loop() {
      /* Motion-blur trail */
      ctx.fillStyle = 'rgba(0, 0, 0, 0.12)';
      ctx.fillRect(0, 0, W, H);

      /* Shockwave rings */
      for (let i = shockwaves.length - 1; i >= 0; i--) {
        const sw = shockwaves[i];
        sw.r += 12;
        const alpha = (1 - sw.r / sw.maxR) * 0.28;
        ctx.beginPath();
        ctx.arc(sw.x, sw.y, sw.r, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(255,255,255,${alpha.toFixed(3)})`;
        ctx.lineWidth = 1;
        ctx.stroke();
        if (sw.r >= sw.maxR) shockwaves.splice(i, 1);
      }

      /* Physics + draw */
      for (let i = 0; i < N; i++) {

        /* Gravity toward cursor */
        if (mx !== null) {
          const dx = mx - px[i];
          const dy = my - py[i];
          const d2 = dx * dx + dy * dy;
          const d  = Math.sqrt(d2) + 1;
          const f  = Math.min(0.95, 750 / (d2 + 100));
          pvx[i] += (dx / d) * f;
          pvy[i] += (dy / d) * f;
        }

        /* Shockwave impulse */
        for (const sw of shockwaves) {
          const sdx = px[i] - sw.x;
          const sdy = py[i] - sw.y;
          const sd  = Math.sqrt(sdx * sdx + sdy * sdy) + 1;
          if (Math.abs(sd - sw.r) < 30) {
            const f = (1 - sw.r / sw.maxR) * sw.str;
            pvx[i] += (sdx / sd) * f;
            pvy[i] += (sdy / sd) * f;
          }
        }

        /* Damping + speed cap */
        pvx[i] *= 0.981;
        pvy[i] *= 0.981;
        const spd = Math.sqrt(pvx[i] * pvx[i] + pvy[i] * pvy[i]);
        if (spd > 15) { pvx[i] = pvx[i] / spd * 15; pvy[i] = pvy[i] / spd * 15; }

        px[i] += pvx[i];
        py[i] += pvy[i];

        /* Respawn out-of-bounds particles from an edge */
        if (px[i] < -60 || px[i] > W + 60 || py[i] < -60 || py[i] > H + 60) {
          spawnEdge(i);
        }

        /* Draw */
        const h = velHue(pvx[i], pvy[i]);
        const l = Math.min(82, 48 + spd * 5);
        ctx.beginPath();
        ctx.arc(px[i], py[i], psz[i], 0, Math.PI * 2);
        ctx.fillStyle = `hsl(${h},100%,${l.toFixed(0)}%)`;
        ctx.fill();
      }

      /* Custom cursor */
      if (mx !== null) {
        ctx.beginPath();
        ctx.arc(mx, my, 8, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(255,255,255,0.65)';
        ctx.lineWidth = 0.8;
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(mx, my, 2, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,0.85)';
        ctx.fill();
      }

      requestAnimationFrame(loop);
    }

    loop();
  </script>
</body>
</html>
